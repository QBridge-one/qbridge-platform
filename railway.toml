# Chain-role indexer worker on Railway.
# This repo also contains Next.js; Railpack defaults to `yarn build`, which fails
# without full app env and is unnecessary here. Deploy the web app separately
# (e.g. Vercel); use this Railway project only for the long-lived indexer.

[build]
buildCommand = "yarn install --frozen-lockfile"

[deploy]
startCommand = "yarn indexer"
restartPolicyType = "ON_FAILURE"
